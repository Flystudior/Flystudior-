<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
  <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="./assets/favicon/site.webmanifest" />
  <title>FLYSTUDIOR</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    .hero {
      background: linear-gradient(135deg, #111, #333);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .logo {
    width: 180px;
    height: 180px;
    background: black;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: bold;
    border: 4px solid white;
    overflow: auto;
    }

    .logo_img{
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .hero h1 {
      margin: 10px 0 5px;
      font-size: 36px;
      letter-spacing: 3px;
    }

    .hero p {
      margin: 0;
      opacity: 0.8;
      letter-spacing: 2px;
    }

    .content {
      max-width: 500px;
      margin: -30px auto 40px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      color: #0077b6;
      font-size: 30px;
    }

    .card p {
      color: #666;
      line-height: 1.6;
    }

    .social-link {
      display: flex;
      align-items: center;
      text-decoration: none;
      background: #fafafa;
      border-radius: 14px;
      padding: 16px;
      margin-top: 16px;
      transition: 0.2s;
      color: black;
      border: 1px solid #e5e5e5;
    }

    .social-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      margin-right: 16px;
      font-weight: bold;
    }

    .instagram { background: #e1306c; }
    .tiktok { background: #111; }

    .social-text h3 {
      margin: 0;
      font-size: 22px;
    }

    .social-text p {
      margin: 4px 0 0;
      color: #777;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo">
      <img src="./assets/images/logo.png" alt="FLYSTUDIOR Logo" class="logo_img">
    </div>
    <!-- <h1>FLYSTUDIOR</h1>
    <p>ONLY RIGHT</p> -->
  </div>

  <div class="content">
    <div class="card">
      <h2>Connect with us on social media</h2>
      <p>Stay updated with our latest fades, haircuts, and grooming trends.</p>

      <a class="social-link" href="https://www.tiktok.com/@flystudior?_r=1&_t=ZN-96M6OOqshaE" target="_blank">
        <div class="icon tiktok">T</div>
        <div class="social-text">
          <h3>TikTok</h3>
          <p>Find us on TikTok</p>
        </div>
      </a>

      <a class="social-link" href="https://www.instagram.com/flystudior?igsh=enpvN3N5bHc0cWI2&utm_source=qr" target="_blank">
        <div class="icon instagram">I</div>
        <div class="social-text">
          <h3>Instagram</h3>
          <p>Follow us</p>
        </div>
      </a>

    </div>
  </div>

</body>
</html>
